<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Uses SAME CSS as login page -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

  <style>
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }
    .password-wrapper input {
      width: 100%;
      padding-right: 2.5rem;
    }
    .toggle-visibility {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      font-size: 1.1rem;
    }
      /* ---- FLASH STYLES (same as login) ---- */
.flash-fixed {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: min(92%, 480px);
  z-index: 9999;
}
.flash-fixed .alert {
  display: block;
  padding: 10px 14px;
  border-radius: 10px;
  margin-bottom: 8px;
  text-align: center;
  font-weight: 500;
  box-shadow: 0 6px 18px rgba(0,0,0,.08);
  transition: opacity .4s ease;
}
.alert-success { background: #d4ffe1; color: #056600; }
.alert-warning { background: #fff4c2; color: #8a6d00; }
.alert-error, .alert-danger, .alert { background: #ffd4d4; color: #7c0000; }

  </style>
</head>

<body>

<!-- ✅ FLASH MESSAGES (top-centered, same as login) -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-fixed" id="flashBox">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}


  <div class="container">

    <form action="{{ url_for('register') }}" method="POST" class="form">
      <h2>Create Account</h2>

      <div class="email">
        <input type="email" name="email" placeholder="Email" required>
      </div>

      <div class="password-wrapper">
        <input type="password" name="password" id="reg_pwd" placeholder="Password (min 8 chars)" minlength="8" required>
        <span class="toggle-visibility" data-target="reg_pwd">👁️</span>
      </div>

      <div class="password-wrapper">
        <input type="password" name="confirm_password" id="reg_cpwd" placeholder="Confirm Password" minlength="8" required>
        <span class="toggle-visibility" data-target="reg_cpwd">👁️</span>
      </div>

      <button class="btn" type="submit">Register</button>
      <p class="inline-msg">Already have an account? <a href="{{ url_for('login_page') }}">Login here</a></p>
    </form>
  </div>

  <!-- ✅ JS: Show/Hide Password -->
 <script>
  // Password visibility toggle
  document.addEventListener('click', function (e) {
    if (e.target.classList.contains('toggle-visibility')) {
      const id = e.target.getAttribute('data-target');
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  });

  // Auto-hide flash after 3s
  (function(){
    const box = document.getElementById('flashBox');
    if (!box) return;
    setTimeout(() => {
      box.style.opacity = '0';
      setTimeout(() => box.remove(), 400);
    }, 3000);
  })();
</script>


</body>
</html>
